<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #camera-feed {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #overlay-canvas {
      display: none;
    }

    /* A-Frame scene sits transparently on top of camera */
    #ar-scene-wrapper {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    a-scene {
      background: transparent !important;
    }

    /* Scanning bar */
    #scan-bar-wrapper {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    #scan-bar {
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00FF88, #00FFCC, #00FF88, transparent);
      position: absolute;
      top: 0;
      animation: scanDown 2s linear infinite;
      box-shadow: 0 0 8px #00FF88;
    }

    @keyframes scanDown {
      0%   { top: 0%; opacity: 1; }
      90%  { top: 100%; opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* Corner brackets to show scan area */
    #scan-frame {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 180px;
      z-index: 3;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: #00FF88;
      border-style: solid;
    }
    .corner.tl { top: 0; left: 0;  border-width: 3px 0 0 3px; }
    .corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; }
    .corner.bl { bottom: 0; left: 0;  border-width: 0 0 3px 3px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

    /* Status pill */
    #status {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 6px 18px;
      border-radius: 20px;
      font-family: monospace;
      font-size: 13px;
      z-index: 10;
      white-space: nowrap;
      border: 1px solid rgba(0,255,136,0.3);
    }

    #status.found {
      border-color: #00FF88;
      color: #00FF88;
    }

    /* Element info card */
    #element-info {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 14px 28px;
      border-radius: 14px;
      font-family: monospace;
      z-index: 10;
      display: none;
      text-align: center;
      border: 1px solid rgba(0,255,136,0.4);
      min-width: 180px;
    }

    #element-info .symbol {
      font-size: 32px;
      font-weight: bold;
      color: #00FF88;
      line-height: 1;
    }

    #element-info .name {
      font-size: 14px;
      color: #ccc;
      margin-top: 4px;
    }

    #element-info .number {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    /* Hint text */
    #hint {
      position: fixed;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45);
      font-family: monospace;
      font-size: 11px;
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }

    #debug-panel {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      max-height: 160px;
      overflow-y: auto;
      background: rgba(0,0,0,0.82);
      font-family: monospace;
      font-size: 11px;
      padding: 6px 8px;
      z-index: 999;
      pointer-events: none;
      border-top: 1px solid rgba(0,255,136,0.2);
    }

    #debug-toggle {
      position: fixed;
      bottom: 0; right: 0;
      background: rgba(0,0,0,0.7);
      color: #00FF88;
      font-family: monospace;
      font-size: 11px;
      padding: 4px 10px;
      z-index: 1000;
      border: none;
      border-top: 1px solid rgba(0,255,136,0.3);
      border-left: 1px solid rgba(0,255,136,0.3);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <video id="camera-feed" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>

  <!-- Scanning UI -->
  <div id="scan-bar-wrapper">
    <div id="scan-bar"></div>
  </div>

  <div id="scan-frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <!-- AR Scene -->
  <div id="ar-scene-wrapper">
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="alpha: true; colorManagement: true"
      style="background: transparent; width:100%; height:100%;">

      <a-camera position="0 0 3" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-model" position="0 0 0"></a-entity>

    </a-scene>
  </div>

  <div id="status">Scanning...</div>

  <div id="element-info">
    <div class="symbol" id="info-symbol">Fe</div>
    <div class="name" id="info-name">Iron</div>
    <div class="number" id="info-number">Atomic No. 26</div>
  </div>

  <div id="hint">Point camera at a periodic table element</div>
  <div id="debug-panel"></div>
  <button id="debug-toggle" onclick="toggleDebug()">LOG</button>
  <script>
    // ── On-screen debug logger ──
    const debugPanel = document.getElementById('debug-panel');
    let debugVisible = true;

    function toggleDebug() {
      debugVisible = !debugVisible;
      debugPanel.style.display = debugVisible ? 'block' : 'none';
      document.getElementById('debug-toggle').textContent = debugVisible ? 'LOG' : 'LOG';
    }

    function log(msg, color = '#00FF88') {
      const line = document.createElement('div');
      line.style.color = color;
      const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
      line.textContent = '[' + time + '] ' + msg;
      debugPanel.appendChild(line);
      while (debugPanel.children.length > 25) debugPanel.removeChild(debugPanel.firstChild);
      debugPanel.scrollTop = debugPanel.scrollHeight;
    }

    // ── Element database ──
    const ELEMENTS = {
      'H':  { name: 'Hydrogen',   number: 1,  color: '#FF6B6B', shape: 'sphere',   model: 'models/hydrogen.glb'  },
      'HE': { name: 'Helium',     number: 2,  color: '#FFD93D', shape: 'sphere',   model: 'models/helium.glb'    },
      'LI': { name: 'Lithium',    number: 3,  color: '#6BCB77', shape: 'box',      model: 'models/lithium.glb'   },
      'BE': { name: 'Beryllium',  number: 4,  color: '#4D96FF', shape: 'box',      model: 'models/beryllium.glb' },
      'B':  { name: 'Boron',      number: 5,  color: '#FF8C00', shape: 'cone',     model: 'models/boron.glb'     },
      'C':  { name: 'Carbon',     number: 6,  color: '#555555', shape: 'box',      model: 'models/carbon.glb'    },
      'N':  { name: 'Nitrogen',   number: 7,  color: '#4D96FF', shape: 'sphere',   model: 'models/nitrogen.glb'  },
      'O':  { name: 'Oxygen',     number: 8,  color: '#FF4444', shape: 'sphere',   model: 'models/oxygen.glb'    },
      'F':  { name: 'Fluorine',   number: 9,  color: '#FFD93D', shape: 'sphere',   model: 'models/fluorine.glb'  },
      'NE': { name: 'Neon',       number: 10, color: '#FF6EC7', shape: 'sphere',   model: 'models/neon.glb'      },
      'NA': { name: 'Sodium',     number: 11, color: '#6BCB77', shape: 'box',      model: 'models/sodium.glb'    },
      'MG': { name: 'Magnesium',  number: 12, color: '#4D96FF', shape: 'cylinder', model: 'models/magnesium.glb' },
      'AL': { name: 'Aluminum',   number: 13, color: '#C0C0C0', shape: 'box',      model: 'models/aluminum.glb'  },
      'SI': { name: 'Silicon',    number: 14, color: '#A0522D', shape: 'box',      model: 'models/silicon.glb'   },
      'P':  { name: 'Phosphorus', number: 15, color: '#FF8C00', shape: 'cone',     model: 'models/phosphorus.glb'},
      'S':  { name: 'Sulfur',     number: 16, color: '#FFD700', shape: 'sphere',   model: 'models/sulfur.glb'    },
      'CL': { name: 'Chlorine',   number: 17, color: '#7CFC00', shape: 'sphere',   model: 'models/chlorine.glb'  },
      'AR': { name: 'Argon',      number: 18, color: '#00CED1', shape: 'sphere',   model: 'models/argon.glb'     },
      'K':  { name: 'Potassium',  number: 19, color: '#9B59B6', shape: 'box',      model: 'models/potassium.glb' },
      'CA': { name: 'Calcium',    number: 20, color: '#F0E68C', shape: 'cylinder', model: 'models/calcium.glb'   },
      'FE': { name: 'Iron',       number: 26, color: '#A0522D', shape: 'box',      model: 'models/iron.glb'      },
      'CU': { name: 'Copper',     number: 29, color: '#FF8C00', shape: 'cylinder', model: 'models/copper.glb'    },
      'ZN': { name: 'Zinc',       number: 30, color: '#708090', shape: 'box',      model: 'models/zinc.glb'      },
      'AG': { name: 'Silver',     number: 47, color: '#C0C0C0', shape: 'sphere',   model: 'models/silver.glb'    },
      'AU': { name: 'Gold',       number: 79, color: '#FFD700', shape: 'sphere',   model: 'models/gold.glb'      },
      'HG': { name: 'Mercury',    number: 80, color: '#B0B0B0', shape: 'sphere',   model: 'models/mercury.glb'   },
      'PB': { name: 'Lead',       number: 82, color: '#708090', shape: 'box',      model: 'models/lead.glb'      },
      'U':  { name: 'Uranium',    number: 92, color: '#00FF7F', shape: 'cylinder', model: 'models/uranium.glb'   },
    };

    const video    = document.getElementById('camera-feed');
    const canvas   = document.getElementById('overlay-canvas');
    const ctx      = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const infoEl   = document.getElementById('element-info');
    const arModel  = document.getElementById('ar-model');
    const hintEl   = document.getElementById('hint');

    // ── Camera ──
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          log('Camera ready: ' + video.videoWidth + 'x' + video.videoHeight);
          startScanning();
        };
      } catch (err) {
        statusEl.textContent = 'Camera denied';
        log('Camera error: ' + err.message, '#FF4444');
      }
    }

    // ── OCR match: count occurrences, pick highest ──
    function matchElement(text) {
      const tokens = text.toUpperCase().replace(/[^A-Z]/g, ' ').split(/\s+/).filter(w => w.length === 1 || w.length === 2);
      const counts = {};

      for (const token of tokens) {
        if (ELEMENTS[token]) counts[token] = (counts[token] || 0) + 1;
      }

      if (Object.keys(counts).length === 0) return null;

      const best = Object.entries(counts).sort((a, b) => {
        if (b[1] !== a[1]) return b[1] - a[1];
        return b[0].length - a[0].length;
      })[0];

      // Single-letter symbols need 2+ hits to avoid false positives
      if (best[0].length === 1 && best[1] < 2) return null;

      return best[0];
    }

    // ── Fallback 3D shape ──
    function showFallbackShape(symbol) {
      const el = ELEMENTS[symbol];
      arModel.innerHTML = '';
      let tag = 'a-box';
      if (el.shape === 'sphere')   tag = 'a-sphere';
      if (el.shape === 'cylinder') tag = 'a-cylinder';
      if (el.shape === 'cone')     tag = 'a-cone';

      const shape = document.createElement(tag);
      shape.setAttribute('color', el.color);
      shape.setAttribute('position', '0 0 0');
      shape.setAttribute('width', '0.6');
      shape.setAttribute('height', '0.6');
      shape.setAttribute('depth', '0.6');
      shape.setAttribute('radius', '0.35');
      shape.setAttribute('animation__spin',
        'property: rotation; to: 0 360 0; loop: true; dur: 2500; easing: linear');
      shape.setAttribute('animation__bob',
        'property: position; from: 0 -0.05 0; to: 0 0.05 0; loop: true; dur: 1500; dir: alternate; easing: easeInOutSine');
      arModel.appendChild(shape);
      log('Showing fallback shape for ' + symbol, '#FFD93D');
    }

    // ── Show element ──
    function showElement(symbol) {
      const el = ELEMENTS[symbol];
      statusEl.textContent = 'Found: ' + symbol + ' — ' + el.name;
      statusEl.classList.add('found');
      infoEl.style.display = 'block';
      hintEl.style.display = 'none';
      document.getElementById('info-symbol').textContent = symbol;
      document.getElementById('info-name').textContent   = el.name;
      document.getElementById('info-number').textContent = 'Atomic No. ' + el.number;

      log('Matched: ' + symbol + ' → loading ' + el.model);

      const modelEl = document.createElement('a-gltf-model');
      modelEl.setAttribute('src', el.model);
      modelEl.setAttribute('position', '0 0 0');
      modelEl.setAttribute('scale', '0.5 0.5 0.5');
      modelEl.setAttribute('animation',
        'property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear');

      modelEl.addEventListener('model-loaded', () => {
        log('Model loaded OK: ' + el.model, '#00FF88');
      });
      modelEl.addEventListener('model-error', () => {
        log('Model FAILED: ' + el.model, '#FF4444');
        showFallbackShape(symbol);
      });

      arModel.innerHTML = '';
      arModel.appendChild(modelEl);
    }

    function hideElement() {
      statusEl.textContent = 'Scanning...';
      statusEl.classList.remove('found');
      infoEl.style.display = 'none';
      hintEl.style.display = 'block';
      arModel.innerHTML    = '';
    }

    // ── Gestures: pinch to scale + 1-finger rotate ──
    let initialDistance = null;
    let initialScale = 1, currentScale = 1;
    let lastTouchX = null, lastTouchY = null;
    let rotX = 0, rotY = 0;

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        initialDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        initialScale = currentScale;
      }
      if (e.touches.length === 1) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });

    document.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (e.touches.length === 2 && initialDistance) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        currentScale = Math.max(0.1, Math.min(5, initialScale * (dist / initialDistance)));
        arModel.setAttribute('scale', currentScale + ' ' + currentScale + ' ' + currentScale);
      }
      if (e.touches.length === 1 && lastTouchX !== null) {
        rotY += (e.touches[0].clientX - lastTouchX) * 0.5;
        rotX += (e.touches[0].clientY - lastTouchY) * 0.5;
        arModel.setAttribute('rotation', rotX + ' ' + rotY + ' 0');
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) initialDistance = null;
      if (e.touches.length === 0) { lastTouchX = null; lastTouchY = null; }
    });

    // ── OCR scanning loop ──
    let isProcessing = false, currentSymbol = null, notFoundCount = 0;

    async function scanFrame() {
      if (isProcessing) return;
      isProcessing = true;

      // Crop to center 50% of frame only
      const sw = Math.floor(video.videoWidth  * 0.5);
      const sh = Math.floor(video.videoHeight * 0.5);
      const sx = Math.floor(video.videoWidth  * 0.25);
      const sy = Math.floor(video.videoHeight * 0.25);
      canvas.width = sw; canvas.height = sh;
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

      try {
        const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz',
          tessedit_pageseg_mode: '6',
        });

        const clean = text.trim().replace(/\n/g, ' ').substring(0, 80);
        log('OCR: ' + clean, '#aaa');

        const found = matchElement(text);

        if (found) {
          notFoundCount = 0;
          if (found !== currentSymbol) {
            currentSymbol = found;
            showElement(found);
          }
        } else {
          notFoundCount++;
          if (notFoundCount >= 3 && currentSymbol) {
            currentSymbol = null;
            hideElement();
          }
        }
      } catch (err) {
        log('OCR error: ' + err.message, '#FF4444');
      }

      isProcessing = false;
    }

    function startScanning() {
      setInterval(scanFrame, 2000);
    }

    startCamera();
    log('App started');
  </script>
</body>
</html>
