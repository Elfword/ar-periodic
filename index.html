<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #camera-feed {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    #overlay-canvas { display: none; }

    #ar-scene-wrapper {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2; pointer-events: none;
    }
    a-scene { background: transparent !important; }

    #scan-bar-wrapper {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3; pointer-events: none; overflow: hidden;
    }
    #scan-bar {
      width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent, #00FF88, #00FFCC, #00FF88, transparent);
      position: absolute; top: 0;
      animation: scanDown 2s linear infinite;
      box-shadow: 0 0 8px #00FF88;
    }
    @keyframes scanDown {
      0%   { top: 0%;   opacity: 1; }
      90%  { top: 100%; opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    #scan-frame {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 280px; height: 180px;
      z-index: 3; pointer-events: none;
    }
    .corner { position: absolute; width: 24px; height: 24px; border-color: #00FF88; border-style: solid; }
    .corner.tl { top: 0; left: 0;    border-width: 3px 0 0 3px; }
    .corner.tr { top: 0; right: 0;   border-width: 3px 3px 0 0; }
    .corner.bl { bottom: 0; left: 0;  border-width: 0 0 3px 3px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

    #status {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: #fff;
      padding: 6px 18px; border-radius: 20px;
      font-family: monospace; font-size: 13px;
      z-index: 10; white-space: nowrap;
      border: 1px solid rgba(0,255,136,0.3);
    }
    #status.found { border-color: #00FF88; color: #00FF88; }

    #element-info {
      position: fixed; bottom: 170px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 14px 28px; border-radius: 14px;
      font-family: monospace; z-index: 10;
      display: none; text-align: center;
      border: 1px solid rgba(0,255,136,0.4); min-width: 180px;
    }
    #element-info .symbol { font-size: 32px; font-weight: bold; color: #00FF88; line-height: 1; }
    #element-info .name   { font-size: 14px; color: #ccc; margin-top: 4px; }
    #element-info .number { font-size: 11px; color: #888; margin-top: 2px; }

    #hint {
      position: fixed; bottom: 180px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45);
      font-family: monospace; font-size: 11px;
      z-index: 10; text-align: center; pointer-events: none;
    }

    #debug-panel {
      position: fixed; bottom: 0; left: 0;
      width: 100%; max-height: 160px; overflow-y: auto;
      background: rgba(0,0,0,0.82);
      font-family: monospace; font-size: 11px;
      padding: 6px 8px; z-index: 999; pointer-events: none;
      border-top: 1px solid rgba(0,255,136,0.2);
    }
    #debug-toggle {
      position: fixed; bottom: 0; right: 0;
      background: rgba(0,0,0,0.7); color: #00FF88;
      font-family: monospace; font-size: 11px;
      padding: 4px 10px; z-index: 1000;
      border: none;
      border-top: 1px solid rgba(0,255,136,0.3);
      border-left: 1px solid rgba(0,255,136,0.3);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <video id="camera-feed" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>

  <div id="scan-bar-wrapper"><div id="scan-bar"></div></div>

  <div id="scan-frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div id="ar-scene-wrapper">
    <a-scene embedded vr-mode-ui="enabled: false"
      renderer="alpha: true; colorManagement: true"
      style="background: transparent; width:100%; height:100%;">
      <a-camera position="0 0 3" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-model" position="0 0 0"></a-entity>
    </a-scene>
  </div>

  <div id="status">Scanning...</div>
  <div id="element-info">
    <div class="symbol" id="info-symbol">Fe</div>
    <div class="name"   id="info-name">Iron</div>
    <div class="number" id="info-number">Atomic No. 26</div>
  </div>
  <div id="hint">Point camera at an element cell</div>
  <div id="debug-panel"></div>
  <button id="debug-toggle" onclick="toggleDebug()">LOG</button>

      line.style.color = color || '#00FF88';

      'SG':  { name: 'Seaborgium',    fullName: 'seaborgium',    number: 106, color: '#808080', shape: 'box',      model: 'models/seaborgium.glb'    },
      'BH':  { name: 'Bohrium',       fullName: 'bohrium',       number: 107, color: '#A9A9A9', shape: 'box',      model: 'models/bohrium.glb'       },
      'HS':  { name: 'Hassium',       fullName: 'hassium',       number: 108, color: '#696969', shape: 'box',      model: 'models/hassium.glb'       },
      'MT':  { name: 'Meitnerium',    fullName: 'meitnerium',    number: 109, color: '#D4D4D4', shape: 'box',      model: 'models/meitnerium.glb'    },
      'DS':  { name: 'Darmstadtium',  fullName: 'darmstadtium',  number: 110, color: '#E8E8E8', shape: 'box',      model: 'models/darmstadtium.glb'  },
      'RG':  { name: 'Roentgenium',   fullName: 'roentgenium',   number: 111, color: '#FFD700', shape: 'box',      model: 'models/roentgenium.glb'   },
      'CN':  { name: 'Copernicium',   fullName: 'copernicium',   number: 112, color: '#B0B0B0', shape: 'box',      model: 'models/copernicium.glb'   },
      'NH':  { name: 'Nihonium',      fullName: 'nihonium',      number: 113, color: '#C0C0C0', shape: 'box',      model: 'models/nihonium.glb'      },
      'FL':  { name: 'Flerovium',     fullName: 'flerovium',     number: 114, color: '#808080', shape: 'box',      model: 'models/flerovium.glb'     },
      'MC':  { name: 'Moscovium',     fullName: 'moscovium',     number: 115, color: '#708090', shape: 'box',      model: 'models/moscovium.glb'     },
      'LV':  { name: 'Livermorium',   fullName: 'livermorium',   number: 116, color: '#778899', shape: 'box',      model: 'models/livermorium.glb'   },
      'TS':  { name: 'Tennessine',    fullName: 'tennessine',    number: 117, color: '#8B008B', shape: 'box',      model: 'models/tennessine.glb'    },
      'OG':  { name: 'Oganesson',     fullName: 'oganesson',     number: 118, color: '#00CED1', shape: 'sphere',   model: 'models/oganesson.glb'     },
    };

    const video    = document.getElementById('camera-feed');
    const canvas   = document.getElementById('overlay-canvas');
    const ctx      = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const infoEl   = document.getElementById('element-info');
    const arModel  = document.getElementById('ar-model');
    const hintEl   = document.getElementById('hint');

    // ── Camera ──
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          log('Camera ready: ' + video.videoWidth + 'x' + video.videoHeight);
          startScanning();
        };
      } catch (err) {
        statusEl.textContent = 'Camera denied';
        log('Camera error: ' + err.message, '#FF4444');
      }
    }

    // ── Multi-evidence scoring ──
    // Symbol token  = +2
    // Full name     = +3
    // Atomic number = +2
    // Min score 3 to match
    function matchElement(text) {
      const upper  = text.toUpperCase().replace(/[^A-Z0-9]/g, ' ');
      const tokens = upper.split(/\s+/).filter(w => w.length > 0);
      const lower  = text.toLowerCase();

      let bestSymbol = null;
      let bestScore  = 0;

      for (const [symbol, el] of Object.entries(ELEMENTS)) {
        let score = 0;
        if (tokens.includes(symbol))            score += 2;
        if (lower.includes(el.fullName))        score += 3;
        if (tokens.includes(String(el.number))) score += 2;

        if (score >= 3 && score > bestScore) {
          bestScore  = score;
          bestSymbol = symbol;
        }
      }

      if (bestSymbol) log('Score: ' + bestSymbol + '=' + bestScore, '#888');
      return bestSymbol;
    }

    // ── Fallback 3D shape ──
    function showFallbackShape(symbol) {
      const el = ELEMENTS[symbol];
      arModel.innerHTML = '';
      let tag = 'a-box';
      if (el.shape === 'sphere')   tag = 'a-sphere';
      if (el.shape === 'cylinder') tag = 'a-cylinder';
      if (el.shape === 'cone')     tag = 'a-cone';
      const shape = document.createElement(tag);
      shape.setAttribute('color', el.color);
      shape.setAttribute('position', '0 0 0');
      shape.setAttribute('width', '0.6');
      shape.setAttribute('height', '0.6');
      shape.setAttribute('depth', '0.6');
      shape.setAttribute('radius', '0.35');
      shape.setAttribute('animation__spin',
        'property: rotation; to: 0 360 0; loop: true; dur: 2500; easing: linear');
      shape.setAttribute('animation__bob',
        'property: position; from: 0 -0.05 0; to: 0 0.05 0; loop: true; dur: 1500; dir: alternate; easing: easeInOutSine');
      arModel.appendChild(shape);
      log('Fallback shape: ' + symbol, '#FFD93D');
    }

    // ── Show element ──
    function showElement(symbol) {
      const el = ELEMENTS[symbol];
      statusEl.textContent = 'Found: ' + symbol + ' — ' + el.name;
      statusEl.classList.add('found');
      infoEl.style.display = 'block';
      hintEl.style.display = 'none';
      document.getElementById('info-symbol').textContent = symbol;
      document.getElementById('info-name').textContent   = el.name;
      document.getElementById('info-number').textContent = 'Atomic No. ' + el.number;
      log('Loading: ' + el.model);

      fetch(el.model)
        .then(r => log(r.ok ? 'File OK: ' + el.model : 'File 404: ' + el.model + ' (' + r.status + ')', r.ok ? '#00FF88' : '#FF4444'))
        .catch(e => log('Fetch err: ' + e.message, '#FF4444'));

      const modelEl = document.createElement('a-gltf-model');
      modelEl.setAttribute('src', el.model);
      modelEl.setAttribute('position', '0 0 0');
      modelEl.setAttribute('scale', '0.5 0.5 0.5');
      modelEl.setAttribute('animation',
        'property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear');
      modelEl.addEventListener('model-loaded', () => log('Model OK: ' + el.model, '#00FF88'));
      modelEl.addEventListener('model-error',  () => { log('Model FAILED: ' + el.model, '#FF4444'); showFallbackShape(symbol); });
      arModel.innerHTML = '';
      arModel.appendChild(modelEl);
    }

    function hideElement() {
      statusEl.textContent = 'Scanning...';
      statusEl.classList.remove('found');
      infoEl.style.display = 'none';
      hintEl.style.display = 'block';
      arModel.innerHTML    = '';
    }

    // ── Gestures ──
    let initialDistance = null, initialScale = 1, currentScale = 1;
    let lastTouchX = null, lastTouchY = null, rotX = 0, rotY = 0;

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        initialDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialScale = currentScale;
      }
      if (e.touches.length === 1) { lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY; }
    });

    document.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (e.touches.length === 2 && initialDistance) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        currentScale = Math.max(0.1, Math.min(5, initialScale * (dist / initialDistance)));
        arModel.setAttribute('scale', currentScale + ' ' + currentScale + ' ' + currentScale);
      }
      if (e.touches.length === 1 && lastTouchX !== null) {
        rotY += (e.touches[0].clientX - lastTouchX) * 0.5;
        rotX += (e.touches[0].clientY - lastTouchY) * 0.5;
        arModel.setAttribute('rotation', rotX + ' ' + rotY + ' 0');
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) initialDistance = null;
      if (e.touches.length === 0) { lastTouchX = null; lastTouchY = null; }
    });

    // ── OCR loop ──
    let isProcessing = false, currentSymbol = null, notFoundCount = 0;

    async function scanFrame() {
      if (isProcessing) return;
      isProcessing = true;

      const sw = Math.floor(video.videoWidth * 0.5);
      const sh = Math.floor(video.videoHeight * 0.5);
      const sx = Math.floor(video.videoWidth * 0.25);
      const sy = Math.floor(video.videoHeight * 0.25);
      canvas.width = sw; canvas.height = sh;
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

      try {
        const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
          tessedit_pageseg_mode: '6',
        });
        log('OCR: ' + text.trim().replace(/\n/g, ' ').substring(0, 80), '#aaa');

        const found = matchElement(text);
        if (found) {
          notFoundCount = 0;
          if (found !== currentSymbol) { currentSymbol = found; showElement(found); }
        } else {
          notFoundCount++;
          if (notFoundCount >= 3 && currentSymbol) { currentSymbol = null; hideElement(); }
        }
      } catch (err) {
        log('OCR error: ' + err.message, '#FF4444');
      }
      isProcessing = false;
    }

    function startScanning() { setInterval(scanFrame, 2000); }

    startCamera();
    log('App started — 118 elements loaded');
  </script>
</body>
</html>
